<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برای مهرنوش 💓🎀</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#0b0f1a,#05070f);
  color:white;
  text-align:center;
  overflow:hidden;
}

/* ستاره */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* ماه */
.moon{
  position:absolute;
  top:40px;
  right:40px;
  width:80px;
  height:80px;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 40px #fff;
}

/* قلب */
.heart{
  position:absolute;
  color:#ff4d6d;
  font-size:18px;
  animation:floatUp 2s linear forwards;
}
@keyframes floatUp{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-200px);opacity:0;}
}

/* کانتینر */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
}
.hidden{display:none;}

button{
  padding:10px 20px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.yes{background:#ff4d6d;color:white;}
.no{background:#444;color:white;position:absolute;}

.option{
  border:1px solid white;
  padding:10px;
  display:inline-block;
  margin:5px;
  border-radius:10px;
  cursor:pointer;
}
.selected{background:#ff4d6d;}

/* میز */
.table{
  width:260px;
  height:130px;
  background:#5c3d2e;
  margin:20px auto;
  border-radius:15px;
  position:relative;
}
.plate{
  width:50px;
  height:50px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:40px;
}
.left{left:25px;}
.right{right:25px;}

.candle{
  width:12px;
  height:50px;
  background:#ffd;
  position:absolute;
  top:-50px;
  left:50%;
  transform:translateX(-50%);
}
.flame{
  width:12px;
  height:12px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-12px;
  animation:flicker .2s infinite;
}
@keyframes flicker{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

/* گل */
.flower{
  font-size:60px;
  animation: pop 1s ease;
}
@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="moon"></div>

<audio id="music" src="music.mp3" loop></audio>

<!-- مرحله 1 -->
<div class="container" id="step1">
<h2>مهرنوش من 💓🎀<br>بیا باهم یه شب خاص بسازیم</h2>
<button class="yes" onclick="next(2)">YES ❤️</button>
<button class="no" id="noBtn">NO 😈</button>
</div>

<!-- لباس -->
<div class="container hidden" id="step2">
<h2>چه استایلی؟ 👗</h2>
<div class="option" onclick="select(this,'dress','رسمی')">رسمی</div>
<div class="option" onclick="select(this,'dress','اسپرت')">اسپرت</div>
<div class="option" onclick="select(this,'dress','ساده')">ساده</div>
<br>
<button onclick="back(1)">⬅️</button>
<button class="yes" onclick="next(3)">ادامه</button>
</div>

<!-- حال و هوا -->
<div class="container hidden" id="step3">
<h2>حال و هوای دیت؟ 😏</h2>
<div class="option" onclick="select(this,'mood','رمانتیک')">رمانتیک ❤️</div>
<div class="option" onclick="select(this,'mood','شیطونی')">شیطونی 😈</div>
<div class="option" onclick="select(this,'mood','آروم')">آروم 🌙</div>
<br>
<button onclick="back(2)">⬅️</button>
<button class="yes" onclick="next(4)">ادامه</button>
</div>

<!-- زمان + پرچم -->
<div class="container hidden" id="step4">
<h2>ساعت شام؟ 🍽️</h2>
<div class="option" onclick="select(this,'time','20')">🇩🇪 20:00 / 🇮🇷 21:30</div>
<div class="option" onclick="select(this,'time','21')">🇩🇪 21:00 / 🇮🇷 22:30</div>
<div class="option" onclick="select(this,'time','22')">🇩🇪 22:00 / 🇮🇷 23:30</div>
<br>
<button onclick="back(3)">⬅️</button>
<button class="yes" onclick="next(5)">ادامه</button>
</div>

<!-- میز -->
<div class="container hidden" id="step5">
<div class="table">
<div class="plate left"></div>
<div class="plate right"></div>
<div class="candle"><div class="flame"></div></div>
</div>

<h2>دوستت دارم قشنگم 💓🎀</h2>
<button onclick="finish()">تایید ❤️</button>
</div>

<!-- پایان -->
<div class="container hidden" id="step6">
<div class="flower">🌹</div>
<h2>سورپرایز برای تو 💖</h2>
<p id="result"></p>
<button onclick="download()">دانلود 📥</button>
</div>

<script>
let answers={};
const music=document.getElementById("music");

/* autoplay */
window.addEventListener("load",()=>{
  music.volume=0.5;
  music.play().catch(()=>{});
});

/* ستاره */
for(let i=0;i<120;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  document.body.appendChild(s);
}

/* مراحل + قلب */
function next(n){

  if(n==2){
    music.play();

    for(let i=0;i<15;i++){
      let h=document.createElement("div");
      h.className="heart";
      h.innerText="💓";
      h.style.left=Math.random()*window.innerWidth+"px";
      h.style.top=Math.random()*window.innerHeight+"px";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),2000);
    }
  }

  document.querySelectorAll(".container").forEach(e=>e.classList.add("hidden"));
  document.getElementById("step"+n).classList.remove("hidden");
}

function back(n){ next(n); }

function select(el,key,val){
document.querySelectorAll("#"+el.parentNode.id+" .option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
answers[key]=val;
}

/* NO فرار */
let no=document.getElementById("noBtn");
no.addEventListener("mouseover",()=>{
no.style.top=Math.random()*80+"%";
no.style.left=Math.random()*80+"%";
});

/* پایان */
function finish(){
next(6);
document.getElementById("result").innerHTML=
"استایل: "+answers.dress+"<br>حال و هوا: "+answers.mood+"<br>زمان: "+answers.time;
}

/* دانلود */
function download(){
let text="Dress: "+answers.dress+"\nMood: "+answers.mood+"\nTime: "+answers.time;
let blob=new Blob([text],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="date.txt";
a.click();
}
</script>

</body>
</html>
